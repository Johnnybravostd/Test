<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Find Your Elements — Decipher Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5c842;--gold2:#e6a800;
  --fire:#ff4500;--water:#0ea5e9;--earth:#22c55e;--air:#a855f7;
  --bg:#06090f;--bg2:#0d1420;--bg3:#141e2e;
  --text:#e8eaf6;--muted:#6b7fa0;
  --ok:#22c55e;--err:#ef4444;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Syne',sans-serif;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:1.5rem;overflow-x:hidden;
}
/* ANIMATED BG */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 20%,rgba(255,69,0,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(14,165,233,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(34,197,94,.04) 0%,transparent 50%),
    radial-gradient(ellipse at 20% 80%,rgba(168,85,247,.04) 0%,transparent 50%);
}
.wrap{max-width:480px;width:100%;position:relative;z-index:1;text-align:center}
/* HEADER */
.eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);opacity:.8;margin-bottom:.8rem}
.title{
  font-family:'Orbitron',monospace;
  font-size:clamp(28px,8vw,52px);font-weight:900;
  color:var(--gold);line-height:1.1;margin-bottom:.4rem;
  text-shadow:0 0 40px rgba(245,200,66,.4);
}
.subtitle{font-family:'Orbitron',monospace;font-size:clamp(9px,2.5vw,12px);color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:1.2rem;opacity:.7}
/* ELEMENTS ROW */
.elements-row{display:flex;gap:12px;justify-content:center;margin-bottom:1.5rem}
.el-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid;animation:float 3s ease-in-out infinite}
.el-icon.fire{border-color:var(--fire);background:rgba(255,69,0,.1);animation-delay:0s}
.el-icon.water{border-color:var(--water);background:rgba(14,165,233,.1);animation-delay:.75s}
.el-icon.earth{border-color:var(--earth);background:rgba(34,197,94,.1);animation-delay:1.5s}
.el-icon.air{border-color:var(--air);background:rgba(168,85,247,.1);animation-delay:2.25s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
/* CARD */
.card{background:var(--bg2);border:1px solid rgba(245,200,66,.15);border-radius:16px;padding:clamp(20px,5vw,32px);box-shadow:0 8px 40px rgba(0,0,0,.5)}
.card-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.id-input{
  width:100%;background:rgba(245,200,66,.04);
  border:2px solid rgba(245,200,66,.2);border-radius:10px;
  padding:14px 16px;color:var(--text);
  font-family:'Orbitron',monospace;font-size:20px;
  letter-spacing:5px;text-align:center;outline:none;
  transition:all .2s;margin-bottom:12px;
}
.id-input:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(245,200,66,.2)}
.id-input::placeholder{color:rgba(255,255,255,.2);letter-spacing:2px;font-size:14px}
.enter-btn{
  width:100%;background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#04080f;border:none;border-radius:10px;
  padding:14px;font-family:'Orbitron',monospace;
  font-size:13px;font-weight:900;letter-spacing:2px;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 20px rgba(245,200,66,.3);
}
.enter-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(245,200,66,.5)}
.enter-btn:active{transform:scale(.98)}
.err-msg{font-size:12px;color:#fca5a5;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:8px 12px;margin-top:8px;display:none}
.err-msg.show{display:block}
/* POPUP OVERLAY */
.popup-overlay{position:fixed;inset:0;z-index:100;background:rgba(6,9,15,.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1.5rem;display:none}
.popup-overlay.show{display:flex;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup{background:var(--bg2);border:2px solid var(--gold);border-radius:20px;padding:clamp(20px,5vw,32px);max-width:380px;width:100%;text-align:center;box-shadow:0 0 60px rgba(245,200,66,.2);animation:popIn .4s}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.popup-verified{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--ok);margin-bottom:12px}
.popup-name{font-family:'Orbitron',monospace;font-size:clamp(18px,5vw,26px);font-weight:900;color:var(--gold);margin-bottom:6px;line-height:1.2}
.popup-grade{font-size:13px;color:var(--muted);margin-bottom:6px}
.popup-group{display:inline-block;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.3);border-radius:20px;padding:4px 16px;font-size:12px;color:var(--gold);margin-bottom:20px;font-family:'Orbitron',monospace;letter-spacing:1px}
.popup-question{font-size:13px;color:var(--muted);margin-bottom:16px}
.popup-btns{display:flex;gap:10px;justify-content:center}
.play-btn{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#04080f;border:none;border-radius:10px;
  padding:12px 28px;font-family:'Orbitron',monospace;
  font-size:12px;font-weight:900;letter-spacing:2px;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 16px rgba(245,200,66,.3);flex:1;
}
.play-btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(245,200,66,.5)}
.notme-btn{
  background:transparent;color:var(--muted);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:12px 20px;font-family:'Syne',sans-serif;
  font-size:12px;cursor:pointer;transition:all .2s;
}
.notme-btn:hover{border-color:var(--err);color:#fca5a5}
/* LOADING */
.loading{display:none;text-align:center;padding:12px}
.loading.show{display:block}
.spinner{width:28px;height:28px;border:3px solid rgba(245,200,66,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Decipher Academy</div>
  <div class="title">FIND YOUR<br>ELEMENTS</div>
  <div class="subtitle">Friday Challenge</div>
  <div class="elements-row">
    <div class="el-icon fire">&#x1F525;</div>
    <div class="el-icon water">&#x1F4A7;</div>
    <div class="el-icon earth">&#x1F30D;</div>
    <div class="el-icon air">&#x1F4A8;</div>
  </div>
  <div class="card">
    <div class="card-label">Enter Your Student ID</div>
    <input class="id-input" id="studentId" type="text" placeholder="e.g. DA001" maxlength="10" autocomplete="off" autocapitalize="characters">
    <button class="enter-btn" onclick="verifyStudent()">FIND MY ELEMENT</button>
    <div class="err-msg" id="errMsg"></div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div style="font-size:12px;color:var(--muted)">Verifying...</div>
    </div>
  </div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup">
    <div class="popup-verified">Student Verified</div>
    <div class="popup-name" id="popupName">—</div>
    <div class="popup-grade" id="popupGrade">—</div>
    <div class="popup-group" id="popupGroup">—</div>
    <div class="popup-question">Is this you?</div>
    <div class="popup-btns">
      <button class="play-btn" id="playBtn" onclick="launchGame()">Play Now</button>
      <button class="notme-btn" onclick="closePopup()">Not Me</button>
    </div>
  </div>
</div>

<script>
const GAME_FILES = {
  1:'game_gr12.html', 2:'game_gr12.html',
  3:'game_gr34.html', 4:'game_gr34.html',
  5:'game_gr56.html', 6:'game_gr56.html',
  7:'game_gr78.html', 8:'game_gr78.html',
  9:'game_gr910.html',10:'game_gr910.html',
  11:'game_gr1112.html',12:'game_gr1112.html'
};
const GRADE_GROUPS = {
  1:'Grade 1 & 2', 2:'Grade 1 & 2',
  3:'Grade 3 & 4', 4:'Grade 3 & 4',
  5:'Grade 5 & 6', 6:'Grade 5 & 6',
  7:'Grade 7 & 8 (JSS 1-2)', 8:'Grade 7 & 8 (JSS 1-2)',
  9:'Grade 9 & 10 (JSS 3 / SS1)', 10:'Grade 9 & 10 (JSS 3 / SS1)',
  11:'Grade 11 & 12 (SS 2-3)', 12:'Grade 11 & 12 (SS 2-3)'
};

let currentStudent = null;

async function verifyStudent() {
  const id = document.getElementById('studentId').value.trim().toUpperCase();
  const errMsg = document.getElementById('errMsg');
  errMsg.classList.remove('show');

  if (!id) {
    errMsg.textContent = 'Please enter your Student ID.';
    errMsg.classList.add('show');
    return;
  }

  document.getElementById('loading').classList.add('show');

  try {
    const response = await fetch('students.json');
    const students = await response.json();
    const student = students[id];
    document.getElementById('loading').classList.remove('show');

    if (student) {
      currentStudent = { id, name: student.name, grade: student.grade };
      showPopup(student.name, student.grade);
    } else {
      errMsg.textContent = 'Student ID not found. Please enter a correct Student ID.';
      errMsg.classList.add('show');
    }
  } catch (e) {
    document.getElementById('loading').classList.remove('show');
    errMsg.textContent = 'Could not load student data. Please try again.';
    errMsg.classList.add('show');
  }
}

function showPopup(name, grade) {
  document.getElementById('popupName').textContent = name;
  document.getElementById('popupGrade').textContent = 'Grade ' + grade;
  document.getElementById('popupGroup').textContent = GRADE_GROUPS[grade] || 'Grade ' + grade;
  document.getElementById('popupOverlay').classList.add('show');
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  currentStudent = null;
}

function launchGame() {
  if (!currentStudent) return;
  const file = GAME_FILES[currentStudent.grade];
  // Pass student data via sessionStorage
  sessionStorage.setItem('student', JSON.stringify(currentStudent));
  window.location.href = file;
}

document.getElementById('studentId').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') verifyStudent();
});
</script>
</body>
</html>
